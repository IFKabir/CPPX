name: Build Docs for Vercel

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write # Required so the action can push the new branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz clang-format

      - name: Configure CMake
        run: cmake -S . -B build

      - name: Generate Documentation
        run: cmake --build build --target doc_doxygen

      - name: Disable Jekyll
        run: touch build/docs/html/.nojekyll

      - name: Push to Vercel branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/docs/html
          publish_branch: vercel-docs # Vercel will watch this branch
          force_orphan: true
